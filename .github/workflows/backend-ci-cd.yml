name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Valores de placeholder só para os testes unitários conseguirem carregar
      # env.ts (que exige as variáveis presentes). Os testes mockam o repositório
      # e nunca conectam de fato no Mongo, então não são credenciais reais.
      PORT: 3000
      MONGODB_URI: mongodb://localhost:27017/test
      PEPPER: ci-test-pepper
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

  build-and-push:
    name: Build e publica no Docker Hub
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-pos-fiap-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/blog-pos-fiap-backend:${{ github.sha }}

  deploy:
    name: Deploy no Render
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy hook do Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL não configurado ainda — pulando deploy."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
